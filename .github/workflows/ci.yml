name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run Tests
        run: |
          cd backend_rust
          cargo test

      - name: Generate and Validate OpenAPI Spec
        run: |
          # Create a dummy DB for the server to start at the expected path
          touch portfolio.db
          
          # Run server in background and fetch spec
          cd backend_rust
          cargo run --bin backend_rust &
          sleep 10
          curl http://127.0.0.1:8000/api-docs/openapi.json > current_openapi.json
          kill $(jobs -p)
          
          # Compare with the committed spec
          diff current_openapi.json ../docs/openapi/openapi.json || (echo "OpenAPI spec has changed! Please update docs/openapi/openapi.json" && exit 1)

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Generate API types
        run: npm run generate-types
        working-directory: frontend

      - name: Run tests
        run: npm test
        working-directory: frontend

  docker-build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build backend (amd64)
        uses: docker/build-push-action@v7
        with:
          context: backend_rust
          file: backend_rust/Dockerfile
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: false

  docker-build-backend-arm64:
    runs-on: investment-portfolio-manager-arm64-runners
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build backend (arm64)
        uses: docker/build-push-action@v7
        with:
          context: backend_rust
          file: backend_rust/Dockerfile
          platforms: linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: false

  docker-build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build frontend
        uses: docker/build-push-action@v7
        with:
          context: frontend
          file: frontend/Dockerfile
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: false
