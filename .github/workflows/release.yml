name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  packages: write

jobs:
  backend-build-amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: x-access-token
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push backend (amd64)
        uses: docker/build-push-action@v7
        with:
          context: backend_rust
          file: backend_rust/Dockerfile
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:${{ steps.version.outputs.VERSION }}-amd64

  backend-build-arm64:
    runs-on: investment-portfolio-manager-arm64-runners
    steps:
      - uses: actions/checkout@v7

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: x-access-token
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push backend (arm64)
        uses: docker/build-push-action@v7
        with:
          context: backend_rust
          file: backend_rust/Dockerfile
          platforms: linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:${{ steps.version.outputs.VERSION }}-arm64

  backend-manifest:
    needs: [backend-build-amd64, backend-build-arm64]
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: x-access-token
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          docker buildx imagetools create -t "ghcr.io/${{ github.repository }}/backend:${VERSION}" \
            "ghcr.io/${{ github.repository }}/backend:${VERSION}-amd64" \
            "ghcr.io/${{ github.repository }}/backend:${VERSION}-arm64"
          docker buildx imagetools create -t "ghcr.io/${{ github.repository }}/backend:latest" \
            "ghcr.io/${{ github.repository }}/backend:${VERSION}-amd64" \
            "ghcr.io/${{ github.repository }}/backend:${VERSION}-arm64"

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: x-access-token
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push frontend
        uses: docker/build-push-action@v7
        with:
          context: frontend
          file: frontend/Dockerfile
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/frontend:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository }}/frontend:latest
