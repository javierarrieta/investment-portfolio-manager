name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  packages: write

jobs:
  backend-build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            target: x86_64-unknown-linux-gnu
            runs-on: ubuntu-latest
          - platform: linux/arm64
            target: aarch64-unknown-linux-gnu
            runs-on: casa-arm64-runners
    runs-on: ${{ matrix.runs-on }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7


      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: x-access-token
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push backend-rust (${{ matrix.platform }})
        uses: docker/build-push-action@v7
        with:
          context: backend_rust
          file: backend_rust/Dockerfile
          platforms: ${{ matrix.platform }}
          build-args: |
            TARGET=${{ matrix.target }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend-rust:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository }}/backend-rust:latest

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: x-access-token
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push frontend
        uses: docker/build-push-action@v7
        with:
          context: frontend
          file: frontend/Dockerfile
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/frontend:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository }}/frontend:latest
