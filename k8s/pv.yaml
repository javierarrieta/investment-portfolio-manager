apiVersion: v1
kind: PersistentVolume
metadata:
  name: postgresql-db-pv
  namespace: investment-portfolio-manager
  labels:
    type: local
spec:
  storageClassName: nfs-client
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: "/mnt/data/postgresql"
